; ============================================================
; php.ini para carpeta admin — Hostinger / cPanel
; Sube este archivo junto al resto de PHP en la carpeta admin/
; ============================================================

; Sesiones
session.use_cookies       = 1
session.use_only_cookies  = 1
session.cookie_httponly   = 1
session.gc_maxlifetime    = 3600
session.use_strict_mode   = 1

; Buffer de salida (evita "headers already sent")
output_buffering          = On

; Errores — cambiar a On solo para depurar, Off en producción
display_errors            = Off
log_errors                = On

; Zona horaria (ajusta según tu país)
date.timezone             = America/Guayaquil
